server:
  port: 8080

spring:
  application:
    name: retail-bank-aicoding-poc

  datasource:
    url: jdbc:h2:file:./data/retail-bank-poc
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

  h2:
    console:
      enabled: true
      path: /h2-console

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.bank.poc.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: info
    org.springframework.jdbc.datasource.init: info
    com.bank.poc.mapper: debug
    com.bank.poc: debug